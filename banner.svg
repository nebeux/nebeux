<svg width="860" height="220" viewBox="0 0 860 220" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="g1" cx="20%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#2d0f42"/>
      <stop offset="100%" stop-color="#080410"/>
    </radialGradient>
    <radialGradient id="g2" cx="80%" cy="30%" r="50%">
      <stop offset="0%" stop-color="#1c0c35"/>
      <stop offset="100%" stop-color="#080410" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="gp" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#da3c72" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#da3c72" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="gb" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#4b2981" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#4b2981" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="c"><rect width="860" height="220" rx="16"/></clipPath>
  </defs>

  <g clip-path="url(#c)">
    <!-- background -->
    <rect width="860" height="220" fill="url(#g1)"/>
    <rect width="860" height="220" fill="url(#g2)"/>
    <ellipse cx="180" cy="110" rx="240" ry="170" fill="url(#gp)"/>
    <ellipse cx="700" cy="80" rx="220" ry="150" fill="url(#gb)"/>

    <!-- decorative lines -->
    <line x1="0" y1="2" x2="860" y2="2" stroke="#4b2981" stroke-width="1" stroke-opacity="0.5"/>
    <line x1="0" y1="218" x2="860" y2="218" stroke="#da3c72" stroke-width="2" stroke-opacity="0.7"/>

    <!-- ghost watermark text -->
    <text x="52" y="165" font-family="monospace" font-size="110" font-weight="700"
          fill="#f8d3e3" fill-opacity="0.04" letter-spacing="-4">NBX</text>

    <!-- eyecatch label -->
    <text x="52" y="84" font-family="monospace" font-size="10"
          fill="#da3c72" fill-opacity="0.75" letter-spacing="6">NEBEUX</text>

    <!-- main name -->
    <text x="52" y="148" font-family="monospace" font-size="62" font-weight="700"
          fill="#f8d3e3" letter-spacing="-1">nebeux</text>

    <!-- pink accent bar left of name -->
    <rect x="52" y="100" width="3" height="58" rx="1" fill="#da3c72"/>

    <!-- tagline -->
    <text x="56" y="174" font-family="monospace" font-size="12"
          fill="#b89ec4" letter-spacing="1.5">full-stack · flask · learning by doing</text>

    <!-- stack strip -->
    <text x="56" y="200" font-family="monospace" font-size="9"
          fill="#43bbc2" fill-opacity="0.85" letter-spacing="2.5">Python · Flask · React · SQLite · Supabase · JS</text>

    <!-- decorative dots row -->
    <rect x="56" y="210" width="30" height="2" rx="1" fill="#da3c72" fill-opacity="0.55"/>
    <rect x="92" y="210" width="10" height="2" rx="1" fill="#4b2981" fill-opacity="0.55"/>
    <rect x="108" y="210" width="5" height="2" rx="1" fill="#43bbc2" fill-opacity="0.45"/>

    <!-- right side: star motifs -->
    <text x="660" y="72" font-family="serif" font-size="80"
          fill="#da3c72" fill-opacity="0.1" font-weight="700">✦</text>
    <text x="760" y="170" font-family="serif" font-size="40"
          fill="#43bbc2" fill-opacity="0.14" font-weight="700">✦</text>
    <text x="620" y="185" font-family="serif" font-size="22"
          fill="#f4dca5" fill-opacity="0.18">✦</text>

    <!-- japanese text vertical right -->
    <text transform="translate(800,50) rotate(90)" font-family="serif" font-size="11"
          fill="#b89ec4" fill-opacity="0.5" letter-spacing="5">推しの子 · OSHI NO KO</text>

    <!-- corner label -->
    <text x="700" y="22" font-family="monospace" font-size="8"
          fill="#da3c72" fill-opacity="0.4" letter-spacing="3">✦ GITHUB PROFILE ✦</text>
  </g>
</svg>
